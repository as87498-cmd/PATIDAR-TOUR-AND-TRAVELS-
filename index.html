<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patidar Tour & Travels</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .header-img { width: 100%; height: auto; display: block; background: #333; min-height: 150px; object-fit: cover; }
        .content { padding: 20px; }
        h2 { text-align: center; margin: 0; color: #2c3e50; font-size: 22px; }
        .tagline { text-align: center; font-size: 13px; color: #7f8c8d; margin-bottom: 15px; font-style: italic; }
        .input-group { margin-bottom: 10px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #34495e; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 8px; }
        .btn { background: #25D366; color: white; width: 100%; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }
    </style>
</head>
<body>

<div class="card">
    <img src="poster.png" alt="Patidar Travels" class="header-img">

    <div class="content">
        <h2>Patidar Tour & Travels</h2>
        <p class="tagline">Aapke Safar Ka Sachcha Sathi</p>
        
        <div class="input-group">
            <label>Naam</label>
            <input type="text" id="custName" placeholder="Customer Name">
        </div>

        <div class="row">
            <div class="input-group" style="flex:1.5;">
                <label>Mobile</label>
                <input type="tel" id="custMob" placeholder="Contact No.">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Sawari (Persons)</label>
                <input type="number" id="passengers" placeholder="Qty" min="1">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>Kahan se</label>
                <input type="text" id="fromLoc" placeholder="From">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Kahan tak</label>
                <input type="text" id="toLoc" placeholder="To">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>Date</label>
                <input type="date" id="tripDate">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Time</label>
                <input type="time" id="tripTime">
            </div>
        </div>

        <button class="btn" onclick="sendToWhatsApp()">Book Now on WhatsApp</button>
    </div>
</div>

<script>
    function sendToWhatsApp() {
        var n = document.getElementById('custName').value;
        var m = document.getElementById('custMob').value;
        var p = document.getElementById('passengers').value;
        var f = document.getElementById('fromLoc').value;
        var t = document.getElementById('toLoc').value;
        var d = document.getElementById('tripDate').value;
        var tm = document.getElementById('tripTime').value;

        if(!n || !m || !f || !t || !p) {
            alert("Bhai, sari details bharo!");
            return;
        }

        var wpNumber = "916264296197"; 

        // Saari details ko ek professional format mein jodna
        var message = "*Patidar Tour & Travels - Booking Request*\n" + 
                      "---------------------------\n" + 
                      "*Name:* " + n + "\n" + 
                      "*Contact:* " + m + "\n" + 
                      "*Sawari:* " + p + "\n" + 
                      "*From:* " + f + "\n" + 
                      "*To:* " + t + "\n" + 
                      "*Date:* " + d + "\n" + 
                      "*Time:* " + tm + "\n" + 
                      "---------------------------\n" + 
                      "Please confirm my booking.";

        // Special encoding taaki details miss na ho
        var finalUrl = "https://api.whatsapp.com/send?phone=" + wpNumber + "&text=" + encodeURIComponent(message);
        
        window.location.href = finalUrl;
    }
</script>

</body>
</html>

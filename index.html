<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patidar Tour & Travels</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .header-img { width: 100%; height: auto; display: block; background: #333; min-height: 180px; object-fit: cover; }
        .content { padding: 25px; }
        h2 { text-align: center; margin: 0; color: #2c3e50; font-size: 22px; }
        .tagline { text-align: center; font-size: 13px; color: #7f8c8d; margin-bottom: 20px; font-style: italic; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #34495e; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        .btn { background: #25D366; color: white; width: 100%; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="poster.jpg" alt="Patidar Travels" class="header-img" onerror="this.src='https://via.placeholder.com/400x200?text=Patidar+Tour+And+Travels+Poster'">

    <div class="content">
        <h2>Patidar Tour & Travels</h2>
        <p class="tagline">Aapke Safar Ka Sachcha Sathi</p>
        
        <div class="input-group">
            <label>Customer Name</label>
            <input type="text" id="custName" placeholder="Apna Naam">
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="custMob" placeholder="Contact No.">
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>From</label>
                <input type="text" id="fromLoc" placeholder="Kahan se">
            </div>
            <div class="input-group" style="flex:1;">
                <label>To</label>
                <input type="text" id="toLoc" placeholder="Destination">
            </div>
        </div>

        <div class="row">
            <div class="input-group" style="flex:1;">
                <label>Date</label>
                <input type="date" id="tripDate">
            </div>
            <div class="input-group" style="flex:1;">
                <label>Time</label>
                <input type="time" id="tripTime">
            </div>
        </div>

        <button class="btn" onclick="sendToWhatsApp()">Book Now on WhatsApp</button>
    </div>
</div>

<script>
    function sendToWhatsApp() {
        // Values capture karo
        var name = document.getElementById('custName').value;
        var mob = document.getElementById('custMob').value;
        var from = document.getElementById('fromLoc').value;
        var to = document.getElementById('toLoc').value;
        var date = document.getElementById('tripDate').value;
        var time = document.getElementById('tripTime').value;

        if(!name || !mob || !from || !to) {
            alert("Bhai, sari details bharo!");
            return;
        }

        var wpNumber = "916264296197"; 

        // Message ko sahi se encode karna
        var message = "*Patidar Tour & Travels - New Booking*%0A" + 
                      "----------------------------%0A" + 
                      "*Name:* " + encodeURIComponent(name) + "%0A" + 
                      "*Contact:* " + encodeURIComponent(mob) + "%0A" + 
                      "*From:* " + encodeURIComponent(from) + "%0A" + 
                      "*To:* " + encodeURIComponent(to) + "%0A" + 
                      "*Date:* " + encodeURIComponent(date) + "%0A" + 
                      "*Time:* " + encodeURIComponent(time) + "%0A" + 
                      "----------------------------%0A" + 
                      "Confirm My Booking!";

        // Final URL
        var finalUrl = "https://wa.me/" + wpNumber + "?text=" + message;
        
        // Mobile par redirect
        window.location.href = finalUrl;
    }
</script>

</body>
</html>
